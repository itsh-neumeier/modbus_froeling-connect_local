id: lambdatronic_s3200
name: Lambdatronic S3200 (Modbus TCP)
description: Generic profile for Froeling Lambdatronic S3200 controllers over Modbus TCP.
manufacturer: Fröling GmbH
model: Lambdatronic S3200
devices:
  gateway:
    name: SP Dual
    model: Lambdatronic S3200
  kessel:
    name: Kessel
    model: Boiler
  boiler_01:
    name: Boiler 1
    model: Domestic Hot Water
  buffer_1:
    name: Puffer 1
    model: Buffer
  heating_circuit_1:
    name: Heizkreis 1
    model: Heating Circuit
  heating_circuit_2:
    name: Heizkreis 2
    model: Heating Circuit
  pellet_unit:
    name: Pellet Einheit
    model: Pellet System
  auger:
    name: Austragung
    model: Pellet Auger
  dhw_heat_pump:
    name: BWP
    model: Domestic Hot Water Heat Pump
entities:
  - key: system_state
    platform: sensor
    register: 34001
    register_type: input
    value_type: enum
    device_key: gateway
    options:
      "0": continuous_load
      "1": domestic_hot_water
      "2": automatic
      "3": logwood_mode
      "4": cleaning
      "5": "off"
      "6": extra_heat
      "7": chimney_sweep
      "8": cleaning

  - key: boiler_state
    platform: sensor
    register: 34002
    register_type: input
    value_type: enum
    device_key: kessel
    options:
      "0": fault
      "1": boiler_off
      "2": ignition
      "3": heating
      "4": ember_preservation
      "5": fire_out
      "6": door_open
      "7": preparation
      "8": preheating
      "9": igniting
      "10": shutdown_wait
      "11": shutdown_wait_1
      "12": shutdown_feed_1
      "13": shutdown_wait_2
      "14": shutdown_feed_2
      "15": cleaning
      "16": wait_2h
      "17": suction_heating
      "18": failed_ignition
      "19": ready
      "33": stopped
      "69": cleaning_possible
      "70": heating_cleaning
      "82": sensor_check

  - key: outside_temperature
    platform: sensor
    register: 31001
    register_type: input
    value_type: float
    scale: 2
    precision: 1
    unit: C
    device_class: temperature
    state_class: measurement
    device_key: gateway

  - key: boiler_temperature
    platform: sensor
    register: 30001
