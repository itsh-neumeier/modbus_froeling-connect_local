id: sp_dual_compact
base_profile: sp_dual
name: SP Dual Compact (Modbus TCP)
description: Profile tuned for SP Dual Compact systems with pellet and logwood operation.
manufacturer: Froeling
model: SP Dual Compact
devices:
  gateway:
    name: SP Dual Compact Controller
  pellet_unit:
    name: Pellet Module
  auger:
    name: Compact Feed and Extraction Unit
exclude_entities:
  - hk2_flow_temperature_actual
  - hk2_flow_temperature_target
  - hk2_enabled
  - hk2_modbus_target_temperature
  - hk2_operating_mode
override_entities:
  - key: pellet_level_percent
    scale: 207
    precision: 1
  - key: fuel_selection
    enabled_by_default: true
